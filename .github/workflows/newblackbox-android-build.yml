name: Build NewBlackbox AAR + Loader APK

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK / NDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" \
            "ndk;24.0.8215888" \
            "ndk;27.0.12077973" \
            "ndk;29.0.13846066"

      - name: Build NewBlackbox AAR and Loader APK
        run: |
          chmod +x gradlew NewBlackbox/gradlew scripts/build-newblackbox-loader.sh
          SDK_DIR="$ANDROID_HOME" ALLOW_DEBUG_FALLBACK=true scripts/build-newblackbox-loader.sh

      - name: List build artifacts
        run: |
          find build/newblackbox-loader-artifacts -maxdepth 1 -type f -printf "%f\n" | sort
          {
            echo "## NewBlackbox Loader Build"
            echo ""
            echo "Download the APK from the workflow artifact named `newblackbox-aar-loader-apk`."
            echo ""
            echo "### Files"
            find build/newblackbox-loader-artifacts -maxdepth 1 -type f -printf '- `%f`\n' | sort
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload NewBlackbox AAR and Loader APK
        uses: actions/upload-artifact@v4
        with:
          name: newblackbox-aar-loader-apk
          path: build/newblackbox-loader-artifacts/*
          if-no-files-found: error
          retention-days: 14
