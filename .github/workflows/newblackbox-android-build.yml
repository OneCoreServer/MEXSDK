name: Build NewBlackbox AAR + Loader APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'NewBlackbox/**'
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/newblackbox-android-build.yml'
  pull_request:
    paths:
      - 'NewBlackbox/**'
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/newblackbox-android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK / NDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;29.0.13846066" \
            "ndk;24.0.8215888"

      - name: Make Gradle wrappers executable
        run: |
          chmod +x gradlew
          chmod +x NewBlackbox/gradlew

      - name: Build NewBlackbox Bcore release AAR
        working-directory: NewBlackbox
        run: ./gradlew --no-daemon :Bcore:assembleRelease

      - name: Verify and replace loader AAR
        run: |
          AAR_SOURCE="NewBlackbox/Bcore/build/outputs/aar/Bcore-release.aar"
          AAR_TARGET="app/libs/Bcore-release.aar"

          test -f "$AAR_SOURCE" || (echo "AAR not found: $AAR_SOURCE" && exit 1)

          cp -f "$AAR_SOURCE" "$AAR_TARGET"
          echo "Replaced loader AAR -> $AAR_TARGET"
          ls -lh "$AAR_TARGET"

      - name: Build loader debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload Bcore AAR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newblackbox-bcore-release-aar
          path: NewBlackbox/Bcore/build/outputs/aar/Bcore-release.aar

      - name: Upload loader debug APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
